<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/index.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Tic Tac Toe</h1>
    </header>
    <main>
      <div id="game-board">
        <div class="cell" data-index-number="0"></div>
        <div class="cell" data-index-number="1"></div>
        <div class="cell" data-index-number="2"></div>
        <div class="cell" data-index-number="3"></div>
        <div class="cell" data-index-number="4"></div>
        <div class="cell" data-index-number="5"></div>
        <div class="cell" data-index-number="6"></div>
        <div class="cell" data-index-number="7"></div>
        <div class="cell" data-index-number="8"></div>
      </div>
      <div class="message-bubble">
        <h2 class="message">Playing</h2>
      </div>
      <div class="controls">
        <button id="new-game">New Game</button>
        <button id="add-players">Add Players</button>
        <button id="add-players">Enable AI</button>
      </div>
      <form action="#" method="post" id="players-form" class="hidden">
        <div class="field">
          <label for="player1-name">Player 1</label>
          <input type="text" id="player1-name" />
        </div>
        <div class="field">
          <label for="player1-name">Player 2</label>
          <input type="text" id="player2-name" />
        </div>
        <button type="submit" id="confirm-players">Confirm</button>
      </form>
    </main>
  </body>
</html>
