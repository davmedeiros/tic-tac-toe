<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/index.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Tic Tac Toe</h1>
    </header>
    <main>
      <div id="game-board">
        <div class="cell" data-index-number="0">0</div>
        <div class="cell" data-index-number="1">1</div>
        <div class="cell" data-index-number="2">2</div>
        <div class="cell" data-index-number="3">3</div>
        <div class="cell" data-index-number="4">4</div>
        <div class="cell" data-index-number="5">5</div>
        <div class="cell" data-index-number="6">6</div>
        <div class="cell" data-index-number="7">7</div>
        <div class="cell" data-index-number="8">8</div>
      </div>
    </main>
  </body>
</html>
